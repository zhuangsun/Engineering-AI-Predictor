<!DOCTYPE html>
<html>

<head>
    <title>Engineering AI Optimization Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f6f9;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
        }

        input {
            width: 80px;
            margin: 3px;
        }

        button {
            padding: 8px 15px;
            background: #0078D7;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>

<body>

    <h1>AI-Driven Engineering Optimization</h1>

    <div class="card">
        <h2>Design Variable Bounds</h2>

        <div>
            x1: <input id="x1_min" placeholder="min">
            <input id="x1_max" placeholder="max"><br>

            x2: <input id="x2_min" placeholder="min">
            <input id="x2_max" placeholder="max"><br>

            x3: <input id="x3_min" placeholder="min">
            <input id="x3_max" placeholder="max"><br>

            x4: <input id="x4_min" placeholder="min">
            <input id="x4_max" placeholder="max"><br>

            x5: <input id="x5_min" placeholder="min">
            <input id="x5_max" placeholder="max"><br>
        </div>

        <br>
        <button onclick="runMulti()">Run Multi-Objective Optimization</button>

        <p id="status"></p>
    </div>

    <div class="card">
        <h2>Pareto Front</h2>
        <canvas id="paretoChart"></canvas>
    </div>

    <script>

        let chart = null;

        async function runMulti() {

            document.getElementById("status").innerText = "Running optimization...";

            const response = await fetch('/optimize_multi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    x1_min: parseFloat(document.getElementById("x1_min").value),
                    x1_max: parseFloat(document.getElementById("x1_max").value),
                    x2_min: parseFloat(document.getElementById("x2_min").value),
                    x2_max: parseFloat(document.getElementById("x2_max").value),
                    x3_min: parseFloat(document.getElementById("x3_min").value),
                    x3_max: parseFloat(document.getElementById("x3_max").value),
                    x4_min: parseFloat(document.getElementById("x4_min").value),
                    x4_max: parseFloat(document.getElementById("x4_max").value),
                    x5_min: parseFloat(document.getElementById("x5_min").value),
                    x5_max: parseFloat(document.getElementById("x5_max").value)
                })
            });

            const data = await response.json();

            document.getElementById("status").innerText = "Optimization complete";

            const ctx = document.getElementById('paretoChart').getContext('2d');

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Pareto Candidates',
                        data: data.objective1.map((val, i) => ({
                            x: data.objective2[i],
                            y: val
                        }))
                    }]
                },
                options: {
                    scales: {
                        x: {
                            title: { display: true, text: 'Objective 2 (Cost)' }
                        },
                        y: {
                            title: { display: true, text: 'Objective 1 (Performance)' }
                        }
                    }
                }
            });
        }
    </script>

</body>

</html>
